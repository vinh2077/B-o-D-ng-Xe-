<!DOCTYPE html>
<html lang="vi">
<head> <link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MotoBike">
<meta name="description" content="Quản lý xe máy toàn diện - bảo dưỡng, luật giao thông, chi phí xăng">
<title>MotoBike Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0a0f;
  --bg2:       #12121a;
  --bg3:       #1a1a26;
  --card:      #16161f;
  --border:    #2a2a3a;
  --orange:    #ff6b00;
  --orange2:   #ff8c00;
  --cyan:      #00e5ff;
  --cyan2:     #00b8d4;
  --green:     #00e676;
  --red:       #ff1744;
  --yellow:    #ffea00;
  --text:      #e8e8f0;
  --text2:     #8888a8;
  --text3:     #555570;
  --radius:    12px;
  --nav-h:     64px;
  --header-h:  56px;
  font-size: 15px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;}
body{display:flex;flex-direction:column;}

/* ── HEADER ── */
.app-header{
  height:var(--header-h);
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  flex-shrink:0;
  position:relative;
  z-index:100;
}
.header-logo{
  font-family:'Rajdhani',sans-serif;
  font-weight:700;font-size:1.4rem;
  letter-spacing:2px;
  background:linear-gradient(90deg,var(--orange),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-subtitle{font-size:.7rem;color:var(--text2);letter-spacing:1px;text-transform:uppercase;}
.header-icon{font-size:1.6rem;}

/* ── MAIN SCROLL AREA ── */
#app{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:12px 12px calc(var(--nav-h) + 12px);
  -webkit-overflow-scrolling:touch;
}

/* ── BOTTOM NAV ── */
.bottom-nav{
  height:var(--nav-h);
  background:var(--bg2);
  border-top:1px solid var(--border);
  display:flex;
  flex-shrink:0;
  position:relative;z-index:100;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  background:none;border:none;cursor:pointer;
  color:var(--text3);transition:color .2s;
  font-family:'Noto Sans',sans-serif;
  padding:4px 0;
}
.nav-btn.active{color:var(--orange);}
.nav-btn svg{width:22px;height:22px;}
.nav-btn span{font-size:.62rem;font-weight:500;letter-spacing:.5px;}

/* ── CARDS ── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:10px;
}
.card-title{
  font-family:'Rajdhani',sans-serif;
  font-weight:600;font-size:1rem;
  color:var(--cyan);letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-box{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:12px;text-align:center;
}
.stat-val{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.6rem;
  color:var(--orange);
}
.stat-lbl{font-size:.68rem;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}

/* ── ALERT CHIPS ── */
.alert{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:8px;
  margin-bottom:6px;font-size:.82rem;
}
.alert.danger{background:rgba(255,23,68,.12);border:1px solid rgba(255,23,68,.3);color:#ff6b81;}
.alert.warn{background:rgba(255,234,0,.08);border:1px solid rgba(255,234,0,.25);color:var(--yellow);}
.alert.ok{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.25);color:var(--green);}

/* ── PROGRESS BAR ── */
.prog-wrap{margin-bottom:10px;}
.prog-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text2);margin-bottom:4px;}
.prog-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.prog-fill.ok{background:linear-gradient(90deg,var(--cyan),var(--green));}
.prog-fill.warn{background:linear-gradient(90deg,var(--yellow),var(--orange));}
.prog-fill.danger{background:linear-gradient(90deg,var(--orange),var(--red));}

/* ── FORM ELEMENTS ── */
.form-group{margin-bottom:12px;}
.form-label{font-size:.75rem;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.5px;}
.form-input, .form-select, .form-textarea{
  width:100%;padding:10px 12px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);
  font-family:'Noto Sans',sans-serif;font-size:.9rem;
  outline:none;transition:border-color .2s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--cyan);}
.form-select option{background:var(--bg2);}
.form-textarea{resize:none;min-height:72px;}

/* ── BUTTONS ── */
.btn{
  width:100%;padding:12px;border:none;border-radius:8px;
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:1rem;
  letter-spacing:1px;cursor:pointer;transition:opacity .2s,transform .1s;
}
.btn:active{transform:scale(.97);opacity:.85;}
.btn-primary{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;}
.btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text);}
.btn-danger{background:rgba(255,23,68,.15);border:1px solid rgba(255,23,68,.4);color:var(--red);}
.btn-sm{width:auto;padding:6px 14px;font-size:.82rem;}

/* ── LIST ITEMS ── */
.list-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px;background:var(--bg3);
  border:1px solid var(--border);border-radius:10px;
  margin-bottom:8px;cursor:pointer;
  transition:border-color .2s;
}
.list-item:active{border-color:var(--orange);}
.list-item-left{display:flex;flex-direction:column;gap:3px;flex:1;}
.list-item-title{font-weight:600;font-size:.92rem;}
.list-item-sub{font-size:.72rem;color:var(--text2);}
.list-item-right{color:var(--text3);font-size:1.2rem;margin-left:8px;}

/* ── BADGE ── */
.badge{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:.65rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
}
.badge-orange{background:rgba(255,107,0,.2);color:var(--orange);border:1px solid rgba(255,107,0,.4);}
.badge-cyan{background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.3);}
.badge-red{background:rgba(255,23,68,.15);color:var(--red);border:1px solid rgba(255,23,68,.35);}
.badge-green{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.3);}

/* ── MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:500;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:18px 18px 0 0;
  width:100%;max-height:88vh;overflow-y:auto;
  padding:20px 16px 32px;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-title{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.2rem;
  color:var(--cyan);letter-spacing:1px;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.modal-handle{
  width:40px;height:4px;background:var(--border);
  border-radius:2px;margin:0 auto 16px;
}

/* ── SEARCH BAR ── */
.search-wrap{position:relative;margin-bottom:12px;}
.search-input{
  width:100%;padding:10px 12px 10px 38px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;color:var(--text);
  font-size:.9rem;outline:none;
  font-family:'Noto Sans',sans-serif;
  transition:border-color .2s;
}
.search-input:focus{border-color:var(--cyan);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:1rem;}

/* ── TAB PILLS ── */
.tab-pills{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.tab-pill{
  flex-shrink:0;padding:5px 14px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-size:.75rem;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.tab-pill.active{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600;}

/* ── KM GAUGE ── */
.gauge-wrap{text-align:center;padding:8px 0;}
.gauge-val{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2.8rem;
  color:var(--orange);line-height:1;
}
.gauge-unit{font-size:.8rem;color:var(--text2);letter-spacing:2px;text-transform:uppercase;}

/* ── CHART BARS ── */
.chart-wrap{display:flex;align-items:flex-end;gap:4px;height:80px;margin:10px 0;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.chart-bar{
  width:100%;border-radius:4px 4px 0 0;
  background:linear-gradient(180deg,var(--cyan),var(--cyan2));
  transition:height .5s ease;min-height:4px;
}
.chart-bar.highlight{background:linear-gradient(180deg,var(--orange),var(--orange2));}
.chart-lbl{font-size:.58rem;color:var(--text3);text-align:center;}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:12px 0;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--border);
  padding:10px 20px;border-radius:20px;
  font-size:.82rem;color:var(--text);
  z-index:999;opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;}

/* ── SECTION PAGES ── */
.page{display:none;}
.page.active{display:block;}

/* ── FAB ── */
.fab{
  position:fixed;right:16px;bottom:calc(var(--nav-h) + 16px);
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(255,107,0,.4);
  z-index:200;font-size:1.4rem;
  transition:transform .2s;
}
.fab:active{transform:scale(.9);}

/* ── EMPTY STATE ── */
.empty-state{
  text-align:center;padding:40px 20px;
  color:var(--text3);
}
.empty-state .empty-icon{font-size:3rem;margin-bottom:12px;opacity:.4;}
.empty-state p{font-size:.85rem;}

/* ── FINE TABLE ── */
.fine-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px 0;border-bottom:1px solid var(--border);gap:8px;
}
.fine-row:last-child{border-bottom:none;}
.fine-name{font-size:.82rem;flex:1;line-height:1.4;}
.fine-amount{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.88rem;color:var(--red);white-space:nowrap;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── LOADING ── */
.loading{
  display:flex;align-items:center;justify-content:center;
  padding:40px;color:var(--text3);gap:10px;
}
.spinner{
  width:20px;height:20px;border:2px solid var(--border);
  border-top-color:var(--cyan);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- MAIN CONTENT -->

</div><!-- end #app -->

<!-- BOTTOM NAV -->

    <span>Bảo dưỡng</span>
  </button>

    <span>Xăng</span>
  </button>
</nav>

<!-- FAB -->
<button class="fab" id="fab-btn" onclick="fabAction()" title="Thêm mới">＋</button>

<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-body">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  DATABASE  (IndexedDB)
// ════════════════════════════════════════
const DB_NAME = 'MotoBikeDB', DB_VER = 2;
let db;

function initDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('users'))
        d.createObjectStore('users', {keyPath:'id', autoIncrement:true});
      if (!d.objectStoreNames.contains('vehicles'))
        d.createObjectStore('vehicles', {keyPath:'id', autoIncrement:true});
      if (!d.objectStoreNames.contains('maintenance_standards'))
        d.createObjectStore('maintenance_standards', {keyPath:'id', autoIncrement:true});
      if (!d.objectStoreNames.contains('maintenance_history'))
        d.createObjectStore('maintenance_history', {keyPath:'id', autoIncrement:true});
      if (!d.objectStoreNames.contains('traffic_laws'))
        d.createObjectStore('traffic_laws', {keyPath:'id', autoIncrement:true});
      if (!d.objectStoreNames.contains('fuel_logs'))
        d.createObjectStore('fuel_logs', {keyPath:'id', autoIncrement:true});
      if (!d.objectStoreNames.contains('violation_history'))
        d.createObjectStore('violation_history', {keyPath:'id', autoIncrement:true});
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = () => rej(req.error);
  });
}

function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
function dbGet(store, id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(id);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
function dbAdd(store, data) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).add(data);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
function dbPut(store, data) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(data);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
function dbDelete(store, id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => res();
    req.onerror   = () => rej(req.error);
  });
}

const fmt = n => {
  if (n === undefined || n === null) return '0đ';
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'tr đ';
  if (n >= 1000)    return Math.round(n/1000) + 'k đ';
  return n + 'đ';
};
const fmtFull = n => new Intl.NumberFormat('vi-VN').format(Math.round(n)) + ' đ';
const today   = () => new Date().toISOString().split('T')[0];
const toast   = (msg, dur=2500) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
};
const openModal  = (html, title='') => {
  document.getElementById('modal-content').innerHTML =
    (title ? `<div class="modal-title">${title}</div>` : '') + html;
  document.getElementById('modal-overlay').classList.add('open');
};
const closeModal = e => {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
};

async function renderDashboard() {
  const vehicles = await dbGetAll('vehicles');
  const fuelLogs = await dbGetAll('fuel_logs');
  const maintHist= await dbGetAll('maintenance_history');
  const standards= await dbGetAll('maintenance_standards');

  document.getElementById('db-vehicles').textContent = vehicles.length;

  // Chi phí tháng này
  const m = today().substring(0, 7);
  const fuelMonth  = fuelLogs.filter(f => f.date && f.date.startsWith(m)).reduce((s,f)=>s+(f.total_cost||0),0);
  const maintMonth = maintHist.filter(x => x.done_date && x.done_date.startsWith(m)).reduce((s,x)=>s+(x.cost||0),0);
  document.getElementById('db-fuel').textContent     = fmt(fuelMonth);
  document.getElementById('db-maintcost').textContent= fmt(maintMonth);

  // Cảnh báo bảo dưỡng
  let alerts = [], alertCount = 0;
  for (const v of vehicles) {
    const ridden = (v.current_km||0) - (v.last_service_km||0);
    for (const s of standards) {
      const pct = ridden / s.km * 100;
      if (pct >= 90) {
        alertCount++;
        const cls = pct >= 100 ? 'danger' : 'warn';
        const icon = pct >= 100 ? '🚨' : '⚡';
        alerts.push(`<div class="alert ${cls}">${icon} <b>${v.name}</b> — ${s.part} (${Math.round(pct)}%)</div>`);
      }
    }
  }
  document.getElementById('db-alerts').textContent = alertCount;
  document.getElementById('dash-alerts-list').innerHTML = alerts.length
    ? alerts.join('')
    : '<div class="alert ok">✅ Tất cả xe trong ngưỡng an toàn bảo dưỡng</div>';

  // Xăng gần nhất
  const recentFuel = [...fuelLogs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
  const vehicleMap = Object.fromEntries(vehicles.map(v => [v.id, v]));
  document.getElementById('dash-fuel-list').innerHTML = recentFuel.length
    ? recentFuel.map(f => `
      <div class="fine-row">
        <div class="fine-name">${vehicleMap[f.vehicle_id]?.name || '—'}<br><small style="color:var(--text3)">${f.date}</small></div>
        <div class="fine-amount">${fmtFull(f.total_cost)}</div>
      </div>`).join('')
    : '<div class="empty-state" style="padding:16px"><p>Chưa có lịch sử đổ xăng</p></div>';

  // BD gần nhất
  const recentMaint = [...maintHist].sort((a,b)=>b.done_date.localeCompare(a.done_date)).slice(0,3);
  document.getElementById('dash-maint-list').innerHTML = recentMaint.length
    ? recentMaint.map(x => `
      <div class="fine-row">
        <div class="fine-name">${x.part_name}<br><small style="color:var(--text3)">${vehicleMap[x.vehicle_id]?.name||'—'} · ${x.done_date}</small></div>
        <div class="fine-amount" style="color:var(--cyan)">${fmtFull(x.cost||0)}</div>
      </div>`).join('')
    : '<div class="empty-state" style="padding:16px"><p>Chưa có lịch sử bảo dưỡng</p></div>';
}

  const standards = await dbGetAll('maintenance_standards');
  el.innerHTML = vehicles.map(v => {

        <div>
          <div style="font-family:Rajdhani,sans-serif;font-weight:700;font-size:1.15rem">${v.name}</div>
          <div style="font-size:.75rem;color:var(--text2)">${v.plate_number||'Chưa có biển'} · ${v.model_year||''}</div>
        </div>
        <span class="badge badge-orange">${v.cylinder_cc||'—'} cc</span>
      </div>
      <div class="gauge-wrap">
        <div class="gauge-val">${Math.round(v.current_km||0).toLocaleString('vi')}</div>
        <div class="gauge-unit">km odometer</div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--text2);margin:8px 0 4px">
        <span>Từ lần BD cuối: ${Math.round(ridden).toLocaleString('vi')} km</span>
        <span style="color:${statusColor}">${statusText}</span>
      </div>
      <div style="font-size:.72rem;color:var(--text3)">Chủ: ${uMap[v.user_id]?.name||'—'}</div>

  }).join('');
}

  const v = await dbGet('vehicles', id);
  openModal(`

      <input class="form-input" type="number" id="new-km" value="${v.current_km||0}" min="${v.current_km||0}">

async function updateKm(id) {
  const v = await dbGet('vehicles', id);
  const newKm = parseFloat(document.getElementById('new-km').value)||0;
  if (newKm < (v.current_km||0)) { toast('⚠ Km mới phải ≥ km hiện tại!'); return; }
  v.current_km = newKm;
  await dbPut('vehicles', v);
  closeModal();
  toast('✅ Đã cập nhật: ' + newKm.toLocaleString('vi') + ' km');
  renderVehicles();
}

async function deleteVehicle(id) {
  if (!confirm('Xóa xe này và toàn bộ dữ liệu liên quan?')) return;
  const fuels = await dbGetAll('fuel_logs');
  const maints= await dbGetAll('maintenance_history');
  for (const f of fuels.filter(x=>x.vehicle_id===id)) await dbDelete('fuel_logs', f.id);
  for (const m of maints.filter(x=>x.vehicle_id===id)) await dbDelete('maintenance_history', m.id);
  await dbDelete('vehicles', id);
  closeModal(); toast('🗑 Đã xóa xe'); renderVehicles();
}

  const name = document.getElementById('v-name').value.trim();

  const uid = parseInt(document.getElementById('v-owner').value)||0;
  await dbAdd('vehicles', {
    user_id: uid, name,
    plate_number:  document.getElementById('v-plate').value.trim(),
    model_year:    parseInt(document.getElementById('v-year').value)||0,
    cylinder_cc:   parseInt(document.getElementById('v-cc').value)||0,
    current_km:    parseFloat(document.getElementById('v-km').value)||0,
    last_service_km: parseFloat(document.getElementById('v-lastKm').value)||0,
    last_service_date: document.getElementById('v-lastDate').value||today(),
    frame_number:  document.getElementById('v-frame').value.trim(),
    engine_number: document.getElementById('v-engine').value.trim(),
    created_at: today()
  });
  closeModal(); toast('✅ Đã thêm xe: ' + name); renderVehicles();
}

          <div class="prog-label"><span>${s.part}</span><span style="color:${pct>=100?'var(--red)':pct>=85?'var(--yellow)':'var(--green)'}">${pct}% (${Math.round(s.km-ridden>0?s.km-ridden:0).toLocaleString('vi')} km còn lại)</span></div>
          <div class="prog-bar"><div class="prog-fill ${fillCls}" style="width:${Math.min(pct,100)}%"></div></div>
        </div>`;
    }).join('');
    html += `
      <div class="card">
        <div class="card-title">🏍️ ${v.name}</div>
        <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:12px;color:var(--text2)">

        </div>
        ${rows}
      </div>`;
  }
  el.innerHTML = html;
}

async function saveMaintRecord() {
  const vid = parseInt(document.getElementById('mr-vehicle').value);
  let part  = document.getElementById('mr-part').value;
  if (part === '__other__') part = document.getElementById('mr-custom').value.trim();

  const km   = parseFloat(document.getElementById('mr-km').value)||0;
  const date = document.getElementById('mr-date').value||today();
  const cost = parseFloat(document.getElementById('mr-cost').value)||0;
  const note = document.getElementById('mr-note').value.trim();

  await dbAdd('maintenance_history', {vehicle_id:vid, part_name:part, done_km:km, done_date:date, cost, note});

  // Nếu là thay nhớt → cập nhật last_service
  if (part.toLowerCase().includes('nhớt') || part.toLowerCase().includes('dầu')) {
    const v = await dbGet('vehicles', vid);
    if (v) { v.last_service_km = km; v.last_service_date = date; await dbPut('vehicles', v); }
  }
  toast('✅ Đã ghi nhận: ' + part);
  switchMaintTab('history');
}

  allLaws = await dbGetAll('traffic_laws');

  ).join('');

function filterLawCat(cat, scroll=true) {
  currentLawCat = cat;
  document.querySelectorAll('#law-cat-tabs .tab-pill').forEach(p => {
    p.classList.toggle('active', p.textContent===cat);
  });
  displayLaws();
  if (scroll) document.getElementById('app').scrollTop=0;
}

function searchLaws() {
  const kw = document.getElementById('law-search').value.toLowerCase();
  currentLawCat = 'Tất cả';
  document.querySelectorAll('#law-cat-tabs .tab-pill').forEach(p => p.classList.toggle('active', p.textContent==='Tất cả'));
  displayLaws(kw);
}

function displayLaws(kw='') {
  const search = kw || document.getElementById('law-search').value.toLowerCase();
  let filtered = allLaws;
  if (currentLawCat !== 'Tất cả') filtered = filtered.filter(l=>l.cat===currentLawCat);
  if (search) filtered = filtered.filter(l =>
    (l.viol+l.cat+l.kw).toLowerCase().includes(search)
  );

  const el = document.getElementById('law-list');
  if (!filtered.length) {
    el.innerHTML='<div class="empty-state"><div class="empty-icon">⚖️</div><p>Không tìm thấy kết quả</p></div>';return;
  }

async function saveFuelLog() {
  const vid   = parseInt(document.getElementById('fl-vehicle').value);
  const date  = document.getElementById('fl-date').value||today();
  const km    = parseFloat(document.getElementById('fl-km').value)||0;
  const liters= parseFloat(document.getElementById('fl-liters').value)||0;
  const price = parseFloat(document.getElementById('fl-price').value)||0;
  const note  = document.getElementById('fl-note').value.trim();
  if (!liters || !price) { toast('⚠ Vui lòng nhập số lít và giá!'); return; }
  const total = liters * price;
  await dbAdd('fuel_logs', {vehicle_id:vid, date, km_at_fill:km, liters, price_per_liter:price, total_cost:total, note});
  // Update vehicle km
  const v = await dbGet('vehicles', vid);
  if (v && km > (v.current_km||0)) { v.current_km = km; await dbPut('vehicles', v); }
  toast('✅ Đã lưu: ' + fmtFull(total));
  switchFuelTab('history');
}

async function renderFuelStats(el) {
  const vehicles = await dbGetAll('vehicles');
  if (!vehicles.length) { el.innerHTML='<div class="empty-state"><p>Chưa có xe</p></div>';return; }
  let html = '';
  for (const v of vehicles) {
    const logs = (await dbGetAll('fuel_logs')).filter(f=>f.vehicle_id===v.id).sort((a,b)=>a.km_at_fill-b.km_at_fill);
    if (logs.length < 2) { html+=`<div class="card"><div class="card-title">${v.name}</div><div class="alert warn">⚡ Cần ≥ 2 lần đổ xăng để tính mức tiêu thụ</div></div>`; continue; }

    let consumptions=[], totalL=0, totalC=0;
    for (let i=1;i<logs.length;i++) {
      const segKm = logs[i].km_at_fill - logs[i-1].km_at_fill;
      const cons = segKm > 0 ? logs[i].liters/segKm*100 : 0;
      consumptions.push({cons, date:logs[i].date});
      totalL += logs[i].liters; totalC += logs[i].total_cost;
    }
    const avgCons = consumptions.reduce((s,c)=>s+c.cons,0)/consumptions.length;
    const maxBar  = Math.max(...consumptions.map(c=>c.cons));
    const evalCls = avgCons<=2.5?'ok':avgCons<=4?'warn':'danger';
    const evalTxt = avgCons<=2.5?'✅ Rất tiết kiệm':avgCons<=4?'⚡ Bình thường':'🚨 Tiêu thụ cao';

    html += `
      <div class="card">
        <div class="card-title">⛽ ${v.name}</div>
        <div class="stat-grid" style="margin-bottom:10px">
          <div class="stat-box"><div class="stat-val">${avgCons.toFixed(2)}</div><div class="stat-lbl">L/100km TB</div></div>
          <div class="stat-box"><div class="stat-val" style="color:var(--red)">${fmtFull(totalC)}</div><div class="stat-lbl">Tổng chi phí</div></div>
        </div>
        <div class="alert ${evalCls}">${evalTxt}</div>
        <div class="card-title" style="margin-top:10px">Biểu đồ L/100km</div>
        <div class="chart-wrap">
          ${consumptions.slice(-8).map((c,i,arr)=>`
            <div class="chart-bar-wrap">
              <div class="chart-bar ${i===arr.length-1?'highlight':''}" style="height:${Math.round(c.cons/maxBar*70)+4}px" title="${c.cons.toFixed(2)} L/100km"></div>
              <div class="chart-lbl">${c.date.substring(5)}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }
  el.innerHTML = html;
}

function registerSW() {
  if ('serviceWorker' in navigator) {
    const blob = new Blob([SW_CODE], {type:'application/javascript'});
    const url  = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  }
}

//  INIT

async function init() {
  // Header date
  const d = new Date();
  document.getElementById('headerDate').textContent =
    d.getDate() + '/' + (d.getMonth()+1);

  await initDB();
  await seedData();
  await renderDashboard();
  renderLaws();
  registerSW();
}

init().catch(console.error);
